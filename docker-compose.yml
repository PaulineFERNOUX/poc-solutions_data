services:
  postgres:
    image: postgres:16
    container_name: pg_activities
    environment:
      POSTGRES_DB: sportsdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d sportsdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  generator:
    build: ./generator
    container_name: activities_generator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sportsdb
      DB_USER: appuser
      DB_PASSWORD: apppass
      SPORT_FILE: /app/data/Données+Sportive.xlsx
      # Aligné sur generator/generate_activities.py (surcharge possible via .env)
      GENERATOR_START_DATE: ${GENERATOR_START_DATE:-2025-01-01}
      GENERATOR_END_DATE: ${GENERATOR_END_DATE:-}
      ACTIVITIES_PER_EMPLOYEE_MIN: ${ACTIVITIES_PER_EMPLOYEE_MIN:-0}
      ACTIVITIES_PER_EMPLOYEE_MAX: ${ACTIVITIES_PER_EMPLOYEE_MAX:-50}
    volumes:
      - ./data:/app/data
    restart: "no"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_VERSION:-v26.1.8}
    container_name: redpanda
    command:
      - redpanda
      - start
      - --mode dev-container
      - --smp 1
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  console:
    image: docker.redpanda.com/redpandadata/console:${REDPANDA_CONSOLE_VERSION:-v3.7.3}
    container_name: sds_redpanda_console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  debezium:
    image: debezium/connect:2.4
    container_name: debezium
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    ports:
      - "8083:8083"

  soda:
    build: ./quality
    container_name: sds_soda_checks
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c "sh /scripts/init-bucket.sh"
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DATALAKE_BUCKET: ${DATALAKE_BUCKET:-datalake}
    volumes:
      - ./minio/init-bucket.sh:/scripts/init-bucket.sh:ro
    restart: "no"

  spark:
    build: ./spark
    container_name: spark
    entrypoint: ["/opt/spark/bin/spark-submit"]
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DATALAKE_BUCKET: ${DATALAKE_BUCKET:-datalake}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-redpanda:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-dbz.public.activities}
      RH_FILE: /app/data/Données+RH.xlsx
      SPORT_FILE: /app/data/Données+Sportive.xlsx
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      SILVER_ONLY_EMPLOYEE_ID: ${SILVER_ONLY_EMPLOYEE_ID:-}
    volumes:
      - ./spark/jobs:/app/jobs:ro
      - ./spark/config:/app/config:ro
      - ./data:/app/data:ro
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
    restart: "no"

  slack:
    profiles: ["slack"]
    build: ./slack
    container_name: sds_slack_consumer
    command: ["python", "notify.py"]
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092
      KAFKA_TOPIC: dbz.public.activities
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sportsdb
      DB_USER: appuser
      DB_PASSWORD: apppass
      RH_FILE: /app/data/Données+RH.xlsx
    volumes:
      - ./data:/app/data
    depends_on:
      redpanda:
        condition: service_healthy
      debezium:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
  redpanda:
  minio_data:
